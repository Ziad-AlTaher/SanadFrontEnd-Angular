<nav class="navbar" [class.glassy]="true">
    <div class="container">
        <div class="navbar-brand">
            <a (click)="scrollToSection('hero')" class="brand-link" role="button" tabindex="0">
                <span class="brand-ar">سند</span>
                <span class="brand-sep">|</span>
                <span class="brand-en">Sanad</span>
            </a>
        </div>

        <!-- Hamburger toggle (mobile only) -->
        <button class="hamburger" (click)="toggleSidebar()" [attr.aria-label]="'menu'">
            <i class="pi" [ngClass]="isSidebarOpen ? 'pi-times' : 'pi-bars'"></i>
        </button>

        <!-- Sidebar overlay (mobile only) -->
        <div class="sidebar-overlay" [class.open]="isSidebarOpen" (click)="closeSidebar()"></div>

        <!-- Sidebar / Nav links -->
        <div class="sidebar" [class.open]="isSidebarOpen">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a (click)="scrollToSection('hero'); closeSidebar()" role="button" tabindex="0"
                        [class.active]="activeSection() === 'hero'">
                        {{ 'navbar.home' | translate }}
                    </a>
                </li>
                <li class="nav-item">
                    <a (click)="scrollToSection('about'); closeSidebar()" role="button" tabindex="0"
                        [class.active]="activeSection() === 'about'">
                        {{ 'navbar.about' | translate }}
                    </a>
                </li>
                <li class="nav-item">
                    <a (click)="scrollToSection('services'); closeSidebar()" role="button" tabindex="0"
                        [class.active]="activeSection() === 'services'">
                        {{ 'navbar.services' | translate }}
                    </a>
                </li>
                <li class="nav-item">
                    <a (click)="scrollToSection('contact'); closeSidebar()" role="button" tabindex="0"
                        [class.active]="activeSection() === 'contact'">
                        {{ 'navbar.contact' | translate }}
                    </a>
                </li>
                @if (isLoggedIn()) {
                <li class="nav-item">
                    logged in
                </li>
                }
            </ul>

            <div class="navbar-actions">
                <p-button [text]="true" [rounded]="true" (onClick)="toggleLanguage()"
                    [label]="currentLang() === 'en' ? 'عربي' : 'English'">
                </p-button>

                <!-- Auth Buttons -->
                @if (!isLoggedIn()) {
                <p-button [text]="true" [rounded]="true" (onClick)="goToAuth()" icon="pi pi-sign-in"
                    [label]="'navbar.login' | translate">
                </p-button>
                } @else {
                <p-button [text]="true" [rounded]="true" (onClick)="goToDashboard()" icon="pi pi-th-large"
                    [label]="'navbar.dashboard' | translate">
                </p-button>
                <p-button [text]="true" [rounded]="true" icon="pi pi-user"
                    [attr.aria-label]="'navbar.account' | translate">
                </p-button>
                <p-button [text]="true" [rounded]="true" (onClick)="logout()" icon="pi pi-sign-out" severity="danger"
                    [attr.aria-label]="'navbar.logout' | translate">
                </p-button>
                }
            </div>
        </div>
    </div>
</nav>
