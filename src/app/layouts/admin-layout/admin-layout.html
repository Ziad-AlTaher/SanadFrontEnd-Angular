<div class="admin-wrapper" [class.sidebar-collapsed]="sidebarCollapsed()">
  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <!-- Logo Area -->
    <div class="sidebar-logo">
      @if (!sidebarCollapsed()) {
        <span class="logo-text">{{ 'admin.title' | translate }}</span>
      }
      <button class="collapse-btn" (click)="toggleSidebar()">
        <i class="pi" [class.pi-angle-right]="currentLang() === 'ar' ? !sidebarCollapsed() : sidebarCollapsed()"
           [class.pi-angle-left]="currentLang() === 'ar' ? sidebarCollapsed() : !sidebarCollapsed()"></i>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
      @for (item of navItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="nav-item-active"
          class="nav-item"
          [title]="item.labelKey | translate"
        >
          <i [class]="item.icon" class="nav-icon"></i>
          @if (!sidebarCollapsed()) {
            <span class="nav-label">{{ item.labelKey | translate }}</span>
          }
        </a>
      }
    </nav>
  </aside>

  <!-- Main Content Area -->
  <div class="admin-main">
    <!-- Top Bar -->
    <header class="admin-topbar">
      <div class="topbar-start">
        <button class="topbar-menu-btn" (click)="toggleSidebar()">
          <i class="pi pi-bars"></i>
        </button>
      </div>
      <div class="topbar-end">
        <!-- Language Toggle -->
        <button class="topbar-btn" (click)="toggleLanguage()" [title]="'admin.toggleLang' | translate">
          <i class="pi pi-globe"></i>
          @if (currentLang() === 'ar') { <span>EN</span> } @else { <span>AR</span> }
        </button>
        <!-- Theme Toggle -->
        <button class="topbar-btn" (click)="toggleTheme()" [title]="'theme.toggle' | translate">
          <i class="pi" [class.pi-sun]="theme() === 'dark'" [class.pi-moon]="theme() === 'light'"></i>
        </button>
        <!-- Admin Avatar -->
        <div class="admin-avatar">
          <i class="pi pi-user"></i>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="admin-content">
      <router-outlet />
    </main>
  </div>
</div>
